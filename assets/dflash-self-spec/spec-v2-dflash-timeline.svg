<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">Spec V2 + DFlash execution timeline</title>
  <desc id="desc">A swimlane timeline showing how SGLang Spec V2 overlaps scheduler work, DFlash draft, target verify, KV materialization, and copy stream output handling.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .laneLabel { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .stage { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .nodeText { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .lane { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 1; }
      .laneAlt { fill: #fbfdff; stroke: #dbe3ee; stroke-width: 1; }
      .box { rx: 8; ry: 8; stroke-width: 1.4; }
      .cpu { fill: #e0f2fe; stroke: #0284c7; }
      .gpu { fill: #ede9fe; stroke: #7c3aed; }
      .target { fill: #dcfce7; stroke: #16a34a; }
      .kv { fill: #fef3c7; stroke: #d97706; }
      .copy { fill: #ffe4e6; stroke: #e11d48; }
      .future { fill: #f1f5f9; stroke: #64748b; }
      .arrow { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke-dasharray: 6 5; }
      .divider { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 4 6; }
    </style>
  </defs>
  <rect class="bg" width="1500" height="760"/>
  <text class="title" x="40" y="42">Spec V2 + DFlash 执行时序：把每轮协调成本藏到 overlap 里</text>
  <text class="subtitle" x="40" y="67">核心观点：DFlash 少跑 target decode，但每轮多了 draft、verify、KV materialization 和调度状态协调；Spec V2 让这些阶段尽量不要串行等待。</text>

  <text class="stage" x="230" y="105">Iteration N: launch / prepare</text>
  <text class="stage" x="500" y="105">Draft block</text>
  <text class="stage" x="730" y="105">Target verify</text>
  <text class="stage" x="970" y="105">Accept + publish</text>
  <text class="stage" x="1200" y="105">Overlap tail work</text>
  <line class="divider" x1="430" y1="88" x2="430" y2="710"/>
  <line class="divider" x1="660" y1="88" x2="660" y2="710"/>
  <line class="divider" x1="900" y1="88" x2="900" y2="710"/>
  <line class="divider" x1="1130" y1="88" x2="1130" y2="710"/>

  <rect class="lane" x="40" y="125" width="1420" height="76"/>
  <rect class="laneAlt" x="40" y="201" width="1420" height="76"/>
  <rect class="lane" x="40" y="277" width="1420" height="76"/>
  <rect class="laneAlt" x="40" y="353" width="1420" height="76"/>
  <rect class="lane" x="40" y="429" width="1420" height="76"/>
  <rect class="laneAlt" x="40" y="505" width="1420" height="76"/>
  <rect class="lane" x="40" y="581" width="1420" height="76"/>
  <text class="laneLabel" x="58" y="169">Scheduler</text>
  <text class="laneLabel" x="58" y="245">FutureMap</text>
  <text class="laneLabel" x="58" y="321">DFlashWorkerV2</text>
  <text class="laneLabel" x="58" y="397">Draft Model</text>
  <text class="laneLabel" x="58" y="473">Target Model</text>
  <text class="laneLabel" x="58" y="549">KV / req_to_token</text>
  <text class="laneLabel" x="58" y="625">Copy Stream</text>

  <rect class="box cpu" x="210" y="142" width="170" height="44"/>
  <text class="nodeText" x="225" y="160">resolve inputs</text>
  <text class="small" x="225" y="176">batch + spec state</text>
  <rect class="box future" x="210" y="218" width="170" height="44"/>
  <text class="nodeText" x="225" y="236">relay GPU state</text>
  <text class="small" x="225" y="252">verified_id / seq_lens</text>
  <line class="arrow" x1="295" y1="186" x2="295" y2="218"/>
  <line class="arrow" x1="380" y1="240" x2="455" y2="318"/>

  <rect class="box gpu" x="455" y="294" width="165" height="44"/>
  <text class="nodeText" x="470" y="312">prepare block</text>
  <text class="small" x="470" y="328">verified_id + masks</text>
  <rect class="box kv" x="455" y="522" width="165" height="44"/>
  <text class="nodeText" x="470" y="540">reserved slots</text>
  <text class="small" x="470" y="556">cache loc / positions</text>
  <line class="arrow" x1="537" y1="522" x2="537" y2="338"/>

  <rect class="box gpu" x="690" y="370" width="170" height="44"/>
  <text class="nodeText" x="705" y="388">draft forward</text>
  <text class="small" x="705" y="404">block hidden states</text>
  <line class="arrowBlue" x1="620" y1="316" x2="690" y2="392"/>
  <rect class="box gpu" x="700" y="294" width="180" height="44"/>
  <text class="nodeText" x="715" y="312">sample draft ids</text>
  <text class="small" x="715" y="328">target lm_head</text>
  <line class="arrow" x1="775" y1="370" x2="790" y2="338"/>

  <rect class="box target" x="925" y="446" width="180" height="44"/>
  <text class="nodeText" x="940" y="464">TARGET_VERIFY</text>
  <text class="small" x="940" y="480">draft token block</text>
  <line class="arrowBlue" x1="880" y1="316" x2="925" y2="468"/>
  <rect class="box gpu" x="940" y="294" width="175" height="44"/>
  <text class="nodeText" x="955" y="312">accept + bonus</text>
  <text class="small" x="955" y="328">new_seq_lens</text>
  <line class="arrow" x1="1015" y1="446" x2="1027" y2="338"/>
  <rect class="box future" x="945" y="218" width="170" height="44"/>
  <text class="nodeText" x="960" y="236">on_publish</text>
  <text class="small" x="960" y="252">seq_lens visible early</text>
  <line class="arrowBlue" x1="1027" y1="294" x2="1030" y2="262"/>

  <rect class="box kv" x="1180" y="522" width="205" height="44"/>
  <text class="nodeText" x="1195" y="540">materialize target hidden</text>
  <text class="small" x="1195" y="556">write draft KV</text>
  <line class="arrow" x1="1105" y1="468" x2="1180" y2="544"/>
  <rect class="box cpu" x="1180" y="142" width="205" height="44"/>
  <text class="nodeText" x="1195" y="160">prepare Iteration N+1</text>
  <text class="small" x="1195" y="176">KV over-allocation</text>
  <line class="arrowBlue dash" x1="1115" y1="240" x2="1180" y2="164"/>
  <rect class="box copy" x="1180" y="598" width="205" height="44"/>
  <text class="nodeText" x="1195" y="616">copy_to_cpu</text>
  <text class="small" x="1195" y="632">outputs / metadata</text>
  <line class="arrow dash" x1="1115" y1="316" x2="1180" y2="620"/>

  <rect class="box cpu" x="1235" y="218" width="150" height="44"/>
  <text class="nodeText" x="1250" y="236">next launch</text>
  <text class="small" x="1250" y="252">minimal waits</text>
  <line class="arrowBlue" x1="1282" y1="186" x2="1310" y2="218"/>

  <rect x="210" y="686" width="740" height="42" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text class="small" x="230" y="711">solid arrows: data/control dependency</text>
  <line class="arrow" x1="515" y1="706" x2="580" y2="706"/>
  <text class="small" x="625" y="711">dashed arrows: overlapped tail work</text>
  <line class="arrow dash" x1="855" y1="706" x2="920" y2="706"/>
</svg>
