<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680" role="img" aria-labelledby="title desc">
  <title id="title">I-DLM 与 Nemotron self-spec 的 draft / verify 边界</title>
  <desc id="desc">上半部分展示 I-DLM 跨轮次把 draft 和 verify 合并到同一 forward；下半部分展示 Nemotron tri-mode 在同一模型内切换 diffusion draft 和 AR verify phase。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .laneTitle { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .tiny { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .box { rx: 12; ry: 12; filter: url(#shadow); }
      .blue { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.5; }
      .green { fill: #d1fae5; stroke: #34d399; stroke-width: 1.5; }
      .yellow { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; }
      .pink { fill: #fce7f3; stroke: #f472b6; stroke-width: 1.5; }
      .gray { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 1.5; }
      .lane { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.4; rx: 18; ry: 18; }
      .dash { stroke-dasharray: 8 6; }
      .arrow { stroke: #4b5563; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #059669; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="680" fill="#f8fafc"/>
  <text x="48" y="46" class="title">Unified self-spec：draft / verify 边界下沉到 runtime</text>
  <text x="48" y="74" class="subtitle">I-DLM 的边界在轮次与 token layout；Nemotron 的边界在 attention phase 与 model mode。</text>

  <rect x="40" y="105" width="1200" height="245" class="lane"/>
  <text x="64" y="136" class="laneTitle">I-DLM / ISD：跨轮次，但单轮 forward 内合并 verify + draft</text>

  <rect x="86" y="170" width="170" height="78" class="box gray"/>
  <text x="112" y="199" class="label">Round t</text>
  <text x="112" y="222" class="small">[t0, M, M, ...]</text>
  <text x="112" y="241" class="tiny">MASK draft</text>

  <rect x="324" y="160" width="210" height="98" class="box blue"/>
  <text x="350" y="190" class="label">采样 speculative tokens</text>
  <text x="350" y="214" class="small">保存 draft 分布 q</text>
  <text x="350" y="235" class="tiny">pending/spec state</text>

  <rect x="600" y="160" width="230" height="98" class="box green"/>
  <text x="626" y="190" class="label">Round t+1 forward</text>
  <text x="626" y="214" class="small">[pending, specs, M, M]</text>
  <text x="626" y="235" class="tiny">verify 旧 specs + draft 新 specs</text>

  <rect x="896" y="160" width="238" height="98" class="box yellow"/>
  <text x="922" y="190" class="label">p/q verify + correction</text>
  <text x="922" y="214" class="small">提交 accepted prefix</text>
  <text x="922" y="235" class="tiny">trim MASK / rejected KV</text>

  <path d="M256 209 C280 209, 296 209, 324 209" class="arrowBlue"/>
  <path d="M534 209 C560 209, 574 209, 600 209" class="arrowBlue"/>
  <path d="M830 209 C856 209, 870 209, 896 209" class="arrowBlue"/>
  <path d="M1015 258 C1015 316, 430 316, 430 258" class="arrowBlue dash"/>
  <text x="558" y="307" class="tiny">new specs 留到下一轮再校验</text>

  <rect x="40" y="385" width="1200" height="245" class="lane"/>
  <text x="64" y="416" class="laneTitle">Nemotron tri-mode：同一模型切换 diffusion draft phase 与 AR verify phase</text>

  <rect x="86" y="450" width="190" height="82" class="box gray"/>
  <text x="112" y="480" class="label">Shared prefix</text>
  <text x="112" y="504" class="small">paged KV / prompt state</text>

  <rect x="338" y="440" width="222" height="102" class="box green"/>
  <text x="364" y="470" class="label">Diffusion draft phase</text>
  <text x="364" y="494" class="small">bidirectional/block attention</text>
  <text x="364" y="516" class="tiny">可选 draft LoRA 打开</text>

  <rect x="620" y="440" width="214" height="102" class="box blue"/>
  <text x="646" y="470" class="label">AR verify phase</text>
  <text x="646" y="494" class="small">causal attention</text>
  <text x="646" y="516" class="tiny">验证 prefix / bonus token</text>

  <rect x="896" y="440" width="238" height="102" class="box pink"/>
  <text x="922" y="470" class="label">Causal KV update</text>
  <text x="922" y="494" class="small">提交 accepted block</text>
  <text x="922" y="516" class="tiny">刷新与 AR prefix 一致的 KV</text>

  <path d="M276 491 C304 491, 318 491, 338 491" class="arrowGreen"/>
  <path d="M560 491 C586 491, 598 491, 620 491" class="arrowGreen"/>
  <path d="M834 491 C860 491, 874 491, 896 491" class="arrowGreen"/>
  <path d="M1015 542 C1015 592, 448 592, 448 542" class="arrowGreen dash"/>
  <text x="560" y="583" class="tiny">下一轮可按 running batch size 选择 block size tier</text>

  <rect x="70" y="642" width="18" height="18" class="blue"/>
  <text x="96" y="656" class="tiny">verify / anchor view</text>
  <rect x="236" y="642" width="18" height="18" class="green"/>
  <text x="262" y="656" class="tiny">draft / diffusion view</text>
  <rect x="420" y="642" width="18" height="18" class="yellow"/>
  <text x="446" y="656" class="tiny">commit / KV trim</text>
  <rect x="586" y="642" width="18" height="18" class="pink"/>
  <text x="612" y="656" class="tiny">causal KV refresh</text>
</svg>
