<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="540" viewBox="0 0 1460 540" role="img" aria-label="Muon hybrid optimizer routing">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="1460" height="540" fill="#FFFFFF"/>
<text text-anchor="start" font-size="22" font-weight="700" fill="#172026"><tspan x="60" y="50.0">AdamW → Muon：推荐的 Hybrid Optimizer 路由</tspan></text>
<text text-anchor="start" font-size="13" font-weight="400" fill="#5D6B78"><tspan x="60" y="82.0">Muon 只接管 2D hidden matrices；其余参数继续交给 AdamW/Lion，降低迁移风险。</tspan></text>
<rect x="60" y="190" width="160" height="90" rx="8" fill="#EEF2F5" stroke="#8794A1" stroke-width="1.5"/>
<text text-anchor="middle" font-size="16" font-weight="600" fill="#172026"><tspan x="140.0" y="227.8">Transformer</tspan><tspan x="140.0" y="247.8">parameters</tspan></text>
<polygon points="350,180.0 415.0,235 350,290.0 285.0,235" fill="#FFFFFF" stroke="#6C7A89" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="350" y="227.9">按参数形态</tspan><tspan x="350" y="246.6">分组</tspan></text>
<rect x="485" y="110" width="220" height="84" rx="8" fill="#DDF4EC" stroke="#14835D" stroke-width="1.5"/>
<text text-anchor="middle" font-size="14" font-weight="600" fill="#172026"><tspan x="595.0" y="145.7">2D hidden matrices</tspan><tspan x="595.0" y="163.2">Q/K/V/O、MLP、MoE experts</tspan></text>
<rect x="765" y="110" width="170" height="84" rx="8" fill="#DDF4EC" stroke="#14835D" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="850.0" y="145.2">Muon</tspan><tspan x="850.0" y="164.0">momentum buffer</tspan></text>
<rect x="995" y="110" width="170" height="84" rx="8" fill="#E6F0FF" stroke="#3465D9" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="1080.0" y="145.2">Newton-Schulz</tspan><tspan x="1080.0" y="164.0">orthogonalization</tspan></text>
<rect x="485" y="300" width="220" height="84" rx="8" fill="#FFF1D6" stroke="#B76E00" stroke-width="1.5"/>
<text text-anchor="middle" font-size="14" font-weight="600" fill="#172026"><tspan x="595.0" y="335.7">Embedding / output</tspan><tspan x="595.0" y="353.2">bias / norm / scalar params</tspan></text>
<rect x="765" y="300" width="170" height="84" rx="8" fill="#FFF1D6" stroke="#B76E00" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="850.0" y="335.2">AdamW / Lion</tspan><tspan x="850.0" y="354.0">scalar optimizer</tspan></text>
<rect x="995" y="300" width="170" height="84" rx="8" fill="#FFF1D6" stroke="#B76E00" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="1080.0" y="335.2">Element-wise</tspan><tspan x="1080.0" y="354.0">adaptive update</tspan></text>
<rect x="1225" y="205" width="170" height="90" rx="8" fill="#FFE8E5" stroke="#C9473D" stroke-width="1.5"/>
<text text-anchor="middle" font-size="16" font-weight="600" fill="#172026"><tspan x="1310.0" y="242.8">Updated model</tspan><tspan x="1310.0" y="262.8">parameters</tspan></text>
<rect x="485" y="430" width="680" height="54" rx="8" fill="#FFFFFF" stroke="#93A1AF" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="500" fill="#172026"><tspan x="825.0" y="459.3">迁移原则：先 matrix-only Muon，再用 loss/token、loss/wall-clock、QK logits 决策是否扩大使用范围。</tspan></text>
<path d="M 220 235 L 285 235" fill="none" stroke="#6C7A89" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="252.5" y="227.0" text-anchor="middle" font-size="11" fill="#6C7A89" font-weight="600">group</text>
<path d="M 415 210 L 450 152 L 485 152" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="450" y="140" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">dim == 2</text>
<path d="M 705 152 L 765 152" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="735.0" y="144.0" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">matrix path</text>
<path d="M 935 152 L 995 152" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="965.0" y="144.0" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">orthogonalize</text>
<path d="M 1165 152 L 1195 152 L 1195 250 L 1225 250" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="1200" y="145" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">spectral update</text>
<path d="M 415 260 L 450 342 L 485 342" fill="none" stroke="#B76E00" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="450" y="360" text-anchor="middle" font-size="11" fill="#B76E00" font-weight="600">else</text>
<path d="M 705 342 L 765 342" fill="none" stroke="#B76E00" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="735.0" y="334.0" text-anchor="middle" font-size="11" fill="#B76E00" font-weight="600">fallback</text>
<path d="M 935 342 L 995 342" fill="none" stroke="#B76E00" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="965.0" y="334.0" text-anchor="middle" font-size="11" fill="#B76E00" font-weight="600">adaptive</text>
<path d="M 1165 342 L 1195 342 L 1195 250 L 1225 250" fill="none" stroke="#B76E00" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="1206" y="365" text-anchor="middle" font-size="11" fill="#B76E00" font-weight="600">element update</text>
</svg>
