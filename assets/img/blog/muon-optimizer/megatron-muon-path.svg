<svg xmlns="http://www.w3.org/2000/svg" width="1730" height="640" viewBox="0 0 1730 640" role="img" aria-label="Megatron Muon optimizer integration path">
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Arial, sans-serif; }</style></defs>
  <rect x="0" y="0" width="1730" height="640" fill="#FFFFFF"/>
<text text-anchor="start" font-size="22" font-weight="700" fill="#172026"><tspan x="60" y="48.0">Megatron 中让 Muon 真正跑起来的路径</tspan></text>
<text text-anchor="start" font-size="13" font-weight="400" fill="#5D6B78"><tspan x="60" y="82.0">关键不是改一个 optimizer 名字，而是保持矩阵语义、分片更新、再同步参数。</tspan></text>
<text text-anchor="start" font-size="14" font-weight="700" fill="#14835D"><tspan x="545" y="142.0">Muon-managed matrix path</tspan></text>
<line x1="545" y1="158" x2="1180" y2="158" stroke="#BFD8CE" stroke-width="1.2"/>
<text text-anchor="start" font-size="14" font-weight="700" fill="#B76E00"><tspan x="545" y="380.0">AdamW/Lion fallback path</tspan></text>
<line x1="545" y1="392" x2="1180" y2="392" stroke="#E7C98B" stroke-width="1.2"/>
<rect x="60" y="250" width="160" height="90" rx="8" fill="#EEF2F5" stroke="#8794A1" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="140.0" y="288.3">Backward</tspan><tspan x="140.0" y="307.1">DDP grad reduce</tspan></text>
<rect x="285" y="250" width="160" height="90" rx="8" fill="#FFFFFF" stroke="#93A1AF" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="365.0" y="288.3">Tag params</tspan><tspan x="365.0" y="307.1">2D vs non-2D</tspan></text>
<rect x="545" y="185" width="190" height="78" rx="8" fill="#DDF4EC" stroke="#14835D" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="600" fill="#172026"><tspan x="640.0" y="218.2">Layer-wise / bucket layout</tspan><tspan x="640.0" y="234.5">whole matrices stay intact</tspan></text>
<rect x="785" y="185" width="190" height="78" rx="8" fill="#DDF4EC" stroke="#14835D" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="600" fill="#172026"><tspan x="880.0" y="218.2">Each DP rank updates</tspan><tspan x="880.0" y="234.5">its assigned matrices</tspan></text>
<rect x="1025" y="185" width="155" height="78" rx="8" fill="#E6F0FF" stroke="#3465D9" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="600" fill="#172026"><tspan x="1102.5" y="218.2">Muon step</tspan><tspan x="1102.5" y="234.5">NS orthogonalization</tspan></text>
<rect x="545" y="402" width="190" height="68" rx="8" fill="#FFF1D6" stroke="#B76E00" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="600" fill="#172026"><tspan x="640.0" y="430.2">Embedding / norm / bias</tspan><tspan x="640.0" y="446.5">standard param groups</tspan></text>
<rect x="785" y="402" width="190" height="68" rx="8" fill="#FFF1D6" stroke="#B76E00" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="600" fill="#172026"><tspan x="880.0" y="430.2">AdamW states</tspan><tspan x="880.0" y="446.5">standard update</tspan></text>
<rect x="1265" y="250" width="180" height="90" rx="8" fill="#FFE8E5" stroke="#C9473D" stroke-width="1.5"/>
<text text-anchor="middle" font-size="14" font-weight="600" fill="#172026"><tspan x="1355.0" y="288.8">All-gather / buffer sync</tspan><tspan x="1355.0" y="306.3">updated parameters</tspan></text>
<rect x="1510" y="250" width="160" height="90" rx="8" fill="#FFFFFF" stroke="#93A1AF" stroke-width="1.5"/>
<text text-anchor="middle" font-size="15" font-weight="600" fill="#172026"><tspan x="1590.0" y="288.3">Next forward</tspan><tspan x="1590.0" y="307.1">uses synced params</tspan></text>
<rect x="1035" y="35" width="260" height="62" rx="8" fill="#FFE8E5" stroke="#C9473D" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="600" fill="#172026"><tspan x="1165.0" y="60.2">QK logit monitor / QK-Clip</tspan><tspan x="1165.0" y="76.5">watch attention stability</tspan></text>
<rect x="545" y="535" width="635" height="58" rx="8" fill="#FFFFFF" stroke="#93A1AF" stroke-width="1.5"/>
<text text-anchor="middle" font-size="13" font-weight="500" fill="#172026"><tspan x="862.5" y="558.2">TP mode: blockwise / duplicated / distributed</tspan><tspan x="862.5" y="574.5">QKV / MLA often need split before orthogonalization</tspan></text>
<path d="M 220 295 L 285 295" fill="none" stroke="#6C7A89" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="252.5" y="287.0" text-anchor="middle" font-size="11" fill="#6C7A89" font-weight="600">gradients</text>
<path d="M 445 280 L 485 224 L 545 224" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="500" y="210" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">2D matrices</text>
<path d="M 735 224 L 785 224" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="760.0" y="216.0" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">assign</text>
<path d="M 975 224 L 1025 224" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="1000.0" y="216.0" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">local step</text>
<path d="M 1180 224 L 1210 224 L 1210 295 L 1265 295" fill="none" stroke="#14835D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="1220" y="215" text-anchor="middle" font-size="11" fill="#14835D" font-weight="600">matrix params</text>
<path d="M 445 315 L 485 436 L 545 436" fill="none" stroke="#B76E00" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="500" y="455" text-anchor="middle" font-size="11" fill="#B76E00" font-weight="600">non-2D</text>
<path d="M 735 436 L 785 436" fill="none" stroke="#B76E00" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="760.0" y="428.0" text-anchor="middle" font-size="11" fill="#B76E00" font-weight="600">fallback</text>
<path d="M 975 436 L 1210 436 L 1210 315 L 1265 315" fill="none" stroke="#B76E00" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="1100" y="425" text-anchor="middle" font-size="11" fill="#B76E00" font-weight="600">scalar params</text>
<path d="M 1445 295 L 1510 295" fill="none" stroke="#C9473D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="1477.5" y="287.0" text-anchor="middle" font-size="11" fill="#C9473D" font-weight="600">synced</text>
<path d="M 1102 185 L 1102 118 L 1165 97" fill="none" stroke="#C9473D" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="1115" y="130" text-anchor="middle" font-size="11" fill="#C9473D" font-weight="600">max logits</text>
</svg>
